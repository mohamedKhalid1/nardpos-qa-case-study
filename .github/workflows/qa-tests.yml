name: QA Automation

on:
  push:
    branches: [main]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run api-tests/NardPOS.postman_collection.json -e api-tests/NardPOS.postman_environment.json
